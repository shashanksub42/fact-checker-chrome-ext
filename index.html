<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Fact Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚖️</span>
        <span class="logo-text">FactCheck<span class="accent">AI</span></span>
      </div>
      <span id="server-status" class="server-badge waking">⏳ Connecting…</span>
    </div>
  </header>

  <!-- ── Setup Panel ──────────────────────────────────────────────── -->
  <section id="setup-panel" class="setup-panel">
    <div class="setup-inner">

      <div id="not-youtube-msg" class="not-youtube-msg hidden">
        ⚠ Open a YouTube video in this tab, then click the extension icon.
      </div>

      <div class="input-group">
        <label for="yt-url">
          YouTube URL
          <span id="url-detected-badge" class="detected-badge hidden">● Auto-detected</span>
        </label>
        <input
          type="text"
          id="yt-url"
          placeholder="https://www.youtube.com/watch?v=..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="input-group">
        <label for="api-key">
          OpenAI API Key
          <span class="label-hint">(stored locally, never sent to our servers)</span>
        </label>
        <div class="key-wrap">
          <input
            type="password"
            id="api-key"
            placeholder="sk-..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="toggle-key" class="icon-btn" title="Show/hide key">👁</button>
        </div>
      </div>
      <button id="load-btn" class="primary-btn">
        <span id="load-btn-text">Load Video &amp; Start Fact Check</span>
        <span id="load-spinner" class="spinner hidden"></span>
      </button>
      <div id="setup-error" class="error-msg hidden"></div>
    </div>
  </section>

  <!-- ── Main Workspace ───────────────────────────────────────────── -->
  <main id="workspace" class="workspace hidden">

    <!-- Video meta: title + time -->
    <div class="video-meta">
      <h2 id="video-title-display" class="video-title"></h2>
      <div class="progress-info">
        <span id="chunk-status"></span>
        <span id="time-display" class="time-badge">0:00</span>
      </div>
    </div>

    <!-- Fact-check results -->
    <div class="results-panel">
      <h3 class="panel-title">
        🔍 Fact Check
        <span id="fc-loading" class="fc-loading hidden">
          <span class="dot-pulse"></span> Analysing…
        </span>
      </h3>
      <div id="results-body" class="results-body">
        <div class="placeholder-msg">Play the video to start fact checking…</div>
      </div>
    </div>

    <!-- Archive -->
    <div class="archive-panel">
      <div class="archive-header">
        <h3 class="panel-title">🗂 Source Archive</h3>
        <button id="clear-archive-btn" class="ghost-btn" title="Clear archive">Clear</button>
      </div>
      <div id="archive-groups" class="archive-groups"></div>
      <div id="archive-empty" class="placeholder-msg">No sources saved yet.</div>
    </div>

  </main>


  <script src="app.js"></script>
</body>
</html>
